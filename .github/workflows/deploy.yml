name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into angular.json
        run: |
          sed -i 's|PLACEHOLDER_WHATSAPP_DISPLAY|${{ secrets.WHATSAPP_DISPLAY }}|g' angular.json
          sed -i 's|PLACEHOLDER_WHATSAPP|${{ secrets.WHATSAPP }}|g' angular.json

      - name: Build
        run: npm run build -- --base-href /portfolio/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/portfolio-v2/browser
